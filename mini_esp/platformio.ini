; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-zero]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Configuración de memoria para el chip de la Waveshare S3 Zero (ESP32-S3FH4R2)
board_build.arduino.memory_type = qio_qspi
board_build.flash_mode = qio
board_upload.flash_size = 4MB
board_build.partitions = default.csv

; Flags esenciales para activar la PSRAM y habilitar el Monitor Serie por USB-C
build_flags = 
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM

monitor_speed = 115200
lib_deps = 
    adafruit/Adafruit NeoPixel @ ^1.12.0
    mlesniew/PicoMQTT@^1.3.0
    wollewald/MPU9250_WE@^1.2.17
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.1.0